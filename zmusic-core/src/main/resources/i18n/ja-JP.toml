# 言語ファイルの形式: TOML（規則に従って修正してください）
# 規則については https://toml.io/ja/ を参照してください

[platform]
netease = "網易雲音楽"
bilibili = "ビリビリ動画"

[init]
loaded = [
    "&aプラグイン起動完了なのです！",
    "&aプラグインのバージョンは&b{version}なのです！",
    "&a現在のプラットフォームは&b{platform}なのです！",
    "&a使い方はこちらを読んでほしいのです：&b{docs-url}",
    "&aこのプラグインの作者は&b{author}なのです！",
]

[update]
checking = "&a更新を確認中なのです…"
check_failed = "&c更新の確認に失敗しちゃったのです！"
available = [
    "&a新しいバージョン&b{version}が見つかったのです！",
    "&a更新内容はこんな感じなのです:",
    "{changelog}",
    "&aダウンロードはこちらからなのです：&b{download}",
]
not_available = "&a今は最新バージョンなのです！"

[help]
tips = "&a&a/&e{command} &bhelp&aって入力すると、使い方を見れるのです！"