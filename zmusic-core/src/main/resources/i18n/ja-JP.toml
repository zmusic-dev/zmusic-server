# 言語ファイルの形式: TOML（規則に従って修正してください）
# 規則については https://toml.io/ja/ を参照してください

[platform]
netease = "Netease Cloud Music"
bilibili = "BiliBili"

[init]
loaded = [
    "&aプラグインの読み込みが完了しました！",
    "&aプラグインのバージョン: &b{version}",
    "&a現在のプラットフォーム: &b{platform}",
    "&a使用ドキュメント: &b{docs-url}",
    "&aプラグインの作者: &b{author}",
]

[update]
checking = "&aアップデートを確認中..."
check_failed = "&cアップデートの確認に失敗しました！"
available = [
    "&a新しいバージョンを発見: &b{version}",
    "&a更新履歴:",
    "{changelog}",
    "&aダウンロードリンク: &b{download}",
]
not_available = "&a現在のバージョンは最新です！"

[help]
tips = "&a&a/&e{command} &bhelp &aと入力してヘルプを確認してください。"
