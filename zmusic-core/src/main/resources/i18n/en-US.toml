# Language file format: TOML (Please modify according to the specification)
# For specification, please refer to https://toml.io/en/

[platform]
netease = "NetEase Cloud Music"
bilibili = "Bilibili"

[init]
loaded = [
    "&aPlugin Loaded!",
    "&aVersion: &b{version}",
    "&aPlatform: &b{platform}",
    "&aDocs: &b{docs-url}",
    "&aAuthor: &b{author}",
]

[disable]
disabled = "&cPlugin Disabled!"

[update]
checking = "&aChecking for updates..."
check_failed = "&cFailed to check for updates."
available = [
    "&aNew version available: &b{version}",
    "&aChangeLog:",
    "{changelog}",
    "&aDownload: &b{download}",
]
not_available = "&aNo new version available."

[help]
tips = "&aInput &a/&e{command} &bhelp &aShow Help."

[config]
outdated = "&cConfig is outdated, please delete the config file and restart the server."

[command]
no_permission = "&cYou do not have permission to use this command."
player_only = "&cThis command can only be used by players."
unknown_subcommand = "&cUnknown subcommand: &e{input}"
invalid_usage = "&cUsage: &e/{usage}"
internal_error = "&cCommand execution failed, please check the server log."
help_header = "&bZMusic Command Help:"
help_entry = "&e/{usage} &7- {description}"
help_detail_header = "&bCommand Help: &e/{usage}"
help_description = "Show help information"
info_description = "Show plugin status"
reload_description = "Reload configuration and language files"
reload_success = "&aConfiguration and language files reloaded."
reload_failed = "&cReload failed, please check the server log."
info_header = "&bZMusic Status:"
info_version = "&7Version: &e{value}"
info_platform = "&7Platform: &e{value}"
info_online_players = "&7Online Players: &e{value}"
