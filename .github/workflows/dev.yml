name: Dev Build

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/**"
      - "gradle/libs.versions.toml"
      - "gradle/wrapper/gradle-wrapper.properties"
      - "gradle.properties"
      - "**/src/**"
      - "**/build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
    branches:
      - "v4"
  pull_request:
    branches:
      - "v4"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Build with Gradle
        run: ./gradlew clean build

      - name: Upload Bukkit Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 'zmusic-bukkit'
          path: zmusic-bukkit/build/libs/*.jar

      - name: Upload Bungee Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 'zmusic-bungee'
          path: zmusic-bungee/build/libs/*.jar

      - name: Upload Velocity Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 'zmusic-velocity'
          path: zmusic-velocity/build/libs/*.jar
