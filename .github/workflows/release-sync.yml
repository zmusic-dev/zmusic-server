name: Sync Release

on:
  release:
    types:
      - published

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Sync Release to Codeberg and CNB
        env:
          SOURCE_RELEASE_ID: ${{ github.event.release.id }}
          GITHUB_TOKEN: ${{ github.token }}
          # 需要在仓库 Secrets 中配置这两个访问令牌。
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: bash scripts/sync-release.sh
