name: ZMusic
main: me.zhenxin.zmusic.BukkitPlugin
version: ${version}
api-version: 1.13
folia-supported: true
author: ZhenXin
description: ZMusic
softdepend:
  - PlaceholderAPI
commands:
  zmusic:
    description: ZMusic main command
    usage: /zmusic
    aliases:
      - music
      - zm
    permission: zmusic.use
permissions:
  zmusic.use:
    description: Allow using the root ZMusic command
    default: true
  zmusic.help:
    description: Allow viewing ZMusic help
    default: true
  zmusic.info:
    description: Allow viewing ZMusic status
    default: true
  zmusic.play:
    description: Allow playing music
    default: true
  zmusic.search:
    description: Allow searching music
    default: true
  zmusic.stop:
    description: Allow stopping music playback
    default: true
  zmusic.volume:
    description: Allow adjusting music volume
    default: true
  zmusic.lyric:
    description: Allow showing lyrics
    default: true
  zmusic.playlist:
    description: Allow managing playlists
    default: true
  zmusic.reload:
    description: Allow reloading ZMusic
    default: op
  zmusic.admin:
    description: Allow all ZMusic admin commands
    default: op
